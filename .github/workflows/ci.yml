name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --registry https://registry.npmjs.org

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check confidence_map/

      - name: Type-check backend (mypy --strict)
        working-directory: backend
        run: uv run mypy --strict confidence_map/

      - name: Type-check frontend (tsc --noEmit)
        working-directory: frontend
        run: pnpm exec tsc --noEmit

      - name: Tests + coverage
        working-directory: backend
        run: uv run pytest
        env:
          ANTHROPIC_API_KEY: test
